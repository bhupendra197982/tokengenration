name: Schedule tt_script.py

on:
  schedule:
    - cron: '2 3 * * 1-5' # 08:32 IST (03:02 UTC), Monday to Friday
  workflow_dispatch:

jobs:
  run-tt-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
      - name: Run tt_script.py
        run: |
          python backend/tt_script.py
