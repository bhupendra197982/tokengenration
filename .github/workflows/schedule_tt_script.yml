name: Schedule tt_script.py

on:
  schedule:
    - cron: '0 3 * * 1-5'  # 8:30 AM IST (03:00 UTC), Monday to Friday
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/schedule_tt_script.yml'
      - 'backend/tt_script.py'
      - 'backend/requirements.txt'

jobs:
  run-tt-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests and run script (v2)
        env:
          TRADETRON_EMAIL: ${{ secrets.TRADETRON_EMAIL }}
          TRADETRON_PASSWORD: ${{ secrets.TRADETRON_PASSWORD }}
          TRADETRON_BROKER_ID: ${{ secrets.TRADETRON_BROKER_ID }}
        run: |
          echo "=== Installing dependencies ==="
          python -m pip install --upgrade pip
          python -m pip install requests
          echo "=== Verifying installation ==="
          python -c "import requests; print('requests version:', requests.__version__)"
          echo "=== Running tt_script.py ==="
          python backend/tt_script.py