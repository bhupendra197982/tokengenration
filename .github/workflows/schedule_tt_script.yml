name: Schedule tt_script.py

on:
  schedule:
    - cron: '0 3 * * 1-5'  # 8:30 AM IST (03:00 UTC), Monday to Friday
  workflow_dispatch:

jobs:
  run-tt-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Run tt_script.py
        working-directory: backend
        env:
          TRADETRON_EMAIL: ${{ secrets.TRADETRON_EMAIL }}
          TRADETRON_PASSWORD: ${{ secrets.TRADETRON_PASSWORD }}
          TRADETRON_BROKER_ID: ${{ secrets.TRADETRON_BROKER_ID }}
        run: python tt_script.py